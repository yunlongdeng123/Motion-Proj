# Motion-Proj global defaults. Other configs override via OmegaConf merge.

schema_version: 2

seed: 1234
device: cuda
dtype: bf16                       # bf16 | fp16 | fp32
work_dir: /root/autodl-tmp/runs/motionproj_v1

paths:
  data_root: /root/autodl-tmp/data/nuscenes      # extracted nuScenes mini lives here
  cache_dir: /root/autodl-tmp/cache/projection   # projection cache output
  ckpt_dir: ${work_dir}/ckpts
  log_dir: ${work_dir}/logs

data:
  name: nuscenes_mini

model:
  name: svd

auditor:
  # SVD 不接收 future ego；正式 generated audit 必须显式覆盖为自估计模式。
  generated_geometry_mode: gt_ego_debug
  background_fit:
    min_confidence: 0.5
    min_points: 256
    max_points: 32768
    irls_iterations: 5
    huber_delta: 2.5
    min_residual_px: 0.5
    ridge: 1.0e-4
  # generated point-track 的正式 replay 参数；CoTracker3 仅允许作为独立 evaluator。
  generated_tracks:
    provider: raft_chain
    queries_per_stratum: 24
    min_track_length: 3
    point_box_size: 16.0
    min_distance: 8.0
    fb_alpha: 0.05
    fb_beta: 0.5
    min_confidence: 0.5

train: {}

cache:
  store: latent
  source: synthetic
  overwrite: false
  max_samples: null
