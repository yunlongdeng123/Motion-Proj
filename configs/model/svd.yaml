model:
  name: svd
  pretrained: stabilityai/stable-video-diffusion-img2vid-xt   # HF repo (download separately)
  parameterization: edm        # SVD uses EDM-style sigmas; projection loss uses x0-form
  num_frames: 8                # must match data.num_frames (SVD-xt native is 25)
  vae_scale_factor: 8
  latent_channels: 4
  lora:
    enable: true
    rank: 16
    alpha: 16
    dropout: 0.0
    # which UNet submodule names to attach LoRA to (attention projections)
    target_modules: [to_q, to_k, to_v, to_out.0]
  freeze_vae: true
  gradient_checkpointing: true
  enable_xformers: true
