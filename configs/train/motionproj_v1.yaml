# V1 training recipe. Compose: default <- data/nuscenes_mini <- model/svd <- this.
defaults_chain:
  - ../default.yaml
  - ../data/nuscenes_mini.yaml
  - ../model/svd.yaml

train:
  # optimization
  lr: 2.0e-5
  weight_decay: 0.0
  max_steps: 2000
  warmup_steps: 50
  micro_batch_size: 1
  grad_accum: 8
  max_grad_norm: 1.0

  # loss weights (plan section 9 initial hyperparameters)
  lambda_proj: 0.1              # 0.05 - 0.2
  beta_anchor: 0.5             # 0.1 - 1.0
  use_real_loss: true

  # low-noise projection "tube"
  tube:
    sigma_quantile_range: [0.0, 0.35]   # last ~35% of the (sorted ascending) sigma schedule
    bound_B: 4.0                        # (1/sigma)*||y - x_dagger|| <= B gate

  # logging / ckpt
  log_every: 20
  ckpt_every: 500
  sample_every: 500
  logger: tensorboard           # tensorboard | none；W&B 只允许显式离线导出
  resume: auto                  # auto | none | <checkpoint directory>
  early_stop_patience: null

cache:
  store: latent                 # latent | rgb
  overwrite: false
  max_samples: null             # null = all available clips
