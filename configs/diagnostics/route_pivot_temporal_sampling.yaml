defaults_chain:
  - ./autoresearch_c0_conditioning.yaml

run_id: route-pivot-r1-temporal-s20260718-v1
work_dir: /root/autodl-tmp/runs/route-pivot-r1-temporal-s20260718-v1

paths:
  ckpt_dir: ${work_dir}/ckpts
  log_dir: ${work_dir}/logs

data:
  split: train
  num_frames: 8
  frame_stride: 1
  height: 256
  width: 448
  use_lidar_depth: false

model:
  num_frames: 8
  lora:
    enable: false
  gradient_checkpointing: false
  enable_xformers: false
  generation:
    protocol: svd_official_v1
    fps: 7
    motion_bucket_id: 127
    noise_aug_strength: 0.02
    min_guidance_scale: 1.0
    max_guidance_scale: 3.0

cache:
  source: clean
  store: latent

train:
  experiment_type: base
  deterministic: true
  num_workers: 0
  max_steps: 1
  logger: none
  resume: none

temporal:
  task_id: RP-R1-02
  real_clip_count: 32
  validation_condition_count: 8
  fps_values: [2, 4, 7]
  reference_fps: 7
  generation_seeds: [2026071801, 2026071802]
  num_frames: 8
  num_inference_steps: 25
  # artifact 的播放速度固定，确保人审看见的是内容差异而非播放器速度差异。
  playback_fps: 7
  minimum_free_disk_gb: 30.0

  evaluator:
    repository_path: /root/autodl-tmp/third_party/co-tracker
    repository_commit: 82e02e8029753ad4ef13cf06be7f4fc5facdda4d
    checkpoint_path: /root/autodl-tmp/weights/cotracker3/scaled_offline.pth
    checkpoint_url: https://huggingface.co/facebook/cotracker3/resolve/main/scaled_offline.pth
    checkpoint_sha256: 2670d4562ed69326dda775a26e54883925cd11b6fc9b24cb7aa9f8078bce7834
    grid_size: 16
    device: cuda

  thresholds:
    # 8 conditions × 2 seeds；允许至多两个 group 因 tracker invalid 被明确丢弃。
    minimum_paired_groups: 14
    bootstrap_samples: 2000
    bootstrap_seed: 2026071802
    minimum_motion_relative_change: 0.10
    maximum_first_frame_psnr_drop_db: 1.0
    minimum_sharpness_ratio: 0.85
    maximum_flicker_ratio: 1.25
    minimum_survival_ratio: 0.90
    maximum_acceleration_p95_ratio: 1.25
    # 明确拒绝通过减少运动获得的“质量改善”。
    minimum_motion_floor_ratio: 0.80
    acceleration_outlier_threshold_px: 10.0
