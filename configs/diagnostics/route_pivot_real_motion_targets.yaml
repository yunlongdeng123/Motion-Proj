defaults_chain:
  - ./autoresearch_c0_conditioning.yaml

run_id: route-pivot-a0-real-motion-s20260718-v2
work_dir: /root/autodl-tmp/runs/route-pivot-a0-real-motion-s20260718-v2

paths:
  ckpt_dir: ${work_dir}/ckpts
  log_dir: ${work_dir}/logs

data:
  split: train
  num_frames: 8
  frame_stride: 1
  height: 256
  width: 448
  min_box_visibility: 2
  use_lidar_depth: true

model:
  num_frames: 8
  lora:
    enable: false
  generation:
    protocol: svd_official_v1
    fps: 7

cache:
  source: clean
  store: latent

train:
  experiment_type: base
  deterministic: true
  num_workers: 0
  max_steps: 1
  logger: none
  resume: none

a0:
  task_id: RP-A0-03
  target_scope: real_training_representation_only
  clip_count: 16
  review_panel_count: 12
  minimum_free_disk_gb: 30.0

  raft:
    device: cuda
    checkpoint_path: /root/.cache/torch/hub/checkpoints/raft_large_C_T_SKHT_V2-ff5fadd5.pth
    checkpoint_sha256: ff5fadd56d26b40647388883af1547351ea17868b765c05b27231e72dd16a322

  thresholds:
    # V5 主门槛；必须在真实 run 前冻结。
    minimum_moving_stationary_auc: 0.75
    # 分母只含投影中心位于图内的观察；部分可见但中心已出画的 box 单独计数。
    minimum_projection_in_box_fraction: 0.98
    minimum_valid_actor_tracks: 32
    minimum_background_angular_agreement: 0.70
    minimum_finite_target_fraction: 0.95

    # 防止小支持集或单一 proxy 偶然通过。
    minimum_labeled_actor_pairs_each: 8
    minimum_background_direction_points: 256
    minimum_velocity_direction_pairs: 16
    minimum_velocity_direction_positive_fraction: 0.60
    maximum_abs_residual_ego_spearman: 0.50
    minimum_lidar_points_per_frame: 64

    # background angular agreement 定义：RAFT 与 sparse ego-flow 均 >=0.25 px，
    # FB confidence >=0.5，且夹角 <=45° 的点所占比例。
    minimum_raft_confidence: 0.50
    minimum_flow_magnitude_px: 0.25
    maximum_direction_angle_deg: 45.0
    box_dilation_px: 2
    maximum_calibration_drift: 1.0e-6
